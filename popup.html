<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studocu Tools</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <header>
    <div class="logo">
      <img class="wordmark" src="img/text-color.svg" alt="Studocu Helper" />
    </div>
    <span class="version">v2.1</span>
  </header>

  <main>
    <div class="card">
      <button id="checkBtn" class="btn btn-primary">
        <div class="icon-box">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
        </div>
        <div class="btn-text">
          <span class="btn-title">Tạo file PDF</span>
          <span class="btn-desc">Dùng như cái tên</span>
        </div>
      </button>

      <button id="clearBtn" class="btn btn-secondary">
        <div class="icon-box">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
        </div>
        <div class="btn-text">
          <span class="btn-title">Bypass mờ và watermark</span>
          <span class="btn-desc">Xoá cookies và reset trang</span>
        </div>
      </button>
    </div>

    <div id="status" class="status-bar">
      <span class="status-dot"></span>
      <span id="status-text">Sẵn sàng hoạt động</span>
    </div>

    <footer>
      Made with <span class="heart">❤</span> by <span class="author">Dat</span><br />
      Contributed by <span class="author">Harytien</span>
    </footer>
  </main>

  <script src="popup.js"></script>
</body>
</html>
